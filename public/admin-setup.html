<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set Up Hotel Print</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="assets/runtime-config.js" defer></script>
    <script src="assets/admin-setup.js" defer></script>
  </head>
  <body class="auth-page">
    <main class="setup-shell">
      <header class="setup-heading">
        <div class="brand-mark" aria-hidden="true">P</div>
        <div>
          <p class="eyebrow">First-time setup</p>
          <h1>Prepare this hotel computer</h1>
          <p>Create the front-desk account and initial printing price.</p>
        </div>
      </header>
      <section class="card">
        <form id="setup-form" novalidate>
          <div class="field-grid">
            <label class="field full">
              <span>Hotel name</span>
              <input id="hotel-name" maxlength="100" required value="Hotel Print Service" />
            </label>
            <label class="field">
              <span>Admin username</span>
              <input id="username" maxlength="32" autocomplete="username" required />
            </label>
            <label class="field">
              <span>Currency</span>
              <input id="currency" maxlength="3" value="USD" required />
            </label>
            <label class="field">
              <span>Free pages</span>
              <input id="free-pages" type="number" min="0" max="1000" value="3" required />
            </label>
            <label class="field">
              <span>Price per extra page</span>
              <div class="money-input">
                <span>$</span>
                <input id="price-per-page" type="number" min="0" step="0.01" value="0.50" required />
              </div>
            </label>
            <label class="field">
              <span>4-digit staff PIN</span>
              <input id="pin" type="password" inputmode="numeric" pattern="[0-9]{4}" minlength="4" maxlength="4" autocomplete="new-password" required />
              <small>Enter exactly 4 numbers.</small>
            </label>
            <label class="field">
              <span>Confirm PIN</span>
              <input id="confirm-pin" type="password" inputmode="numeric" pattern="[0-9]{4}" minlength="4" maxlength="4" autocomplete="new-password" required />
            </label>
          </div>
          <div id="setup-error" class="alert error hidden" role="alert"></div>
          <button class="button primary" type="submit">Complete setup</button>
        </form>
      </section>
    </main>
  </body>
</html>
